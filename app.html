<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JLPT 読解">
<meta name="theme-color" content="#1565c0">
<meta name="description" content="JLPT N5/N4/N3 読解練習アプリ">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231565c0'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' font-family='serif'>読</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>JLPT 読解練習</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
:root{--cur:#1565c0;--curl:#e3f2fd;--curb:#0d3b6e;--ink:#1a1a1a;--gray:#555;--lg:#999;--bg:#f4f4f0;--card:#fff;--r:14px;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7;min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}
/* HOME */
#home{background:linear-gradient(160deg,#1a1a2e,#0f3460);align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.home-logo{font-size:.75rem;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:1.5rem}
.home-title{font-size:2.4rem;font-weight:700;color:#fff;margin-bottom:.5rem}
.home-sub{font-size:.9rem;color:rgba(255,255,255,.5);margin-bottom:2.5rem}
.lcards{width:100%;max-width:380px;display:flex;flex-direction:column;gap:1rem}
.lcard{border-radius:var(--r);padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1rem;cursor:pointer;border:none;text-align:left;width:100%;transition:transform .15s}
.lcard:active{transform:scale(.97)}
.lcard.n5{background:linear-gradient(135deg,#2e7d32,#43a047)}
.lcard.n4{background:linear-gradient(135deg,#1565c0,#1976d2)}
.lcard.n3{background:linear-gradient(135deg,#bf360c,#e64a19)}
.lcn{font-size:2rem;font-weight:700;color:rgba(255,255,255,.3);min-width:56px}
.lci{flex:1}.lct{font-size:1.2rem;font-weight:700;color:#fff}
.lcd{font-size:.78rem;color:rgba(255,255,255,.7);margin-top:2px}
.lcs{display:flex;gap:.5rem;margin-top:6px;flex-wrap:wrap}
.sp{background:rgba(255,255,255,.15);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:20px}
/* TOP BAR */
.tbar{background:var(--cur);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100}
.bbtn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ttl{color:#fff;font-size:1rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta{color:rgba(255,255,255,.7);font-size:.78rem;flex-shrink:0}
/* PROG BAR */
.pb-wrap{background:var(--cur);padding:0 1.2rem .8rem}
.pb-bg{background:rgba(255,255,255,.2);border-radius:4px;height:6px;overflow:hidden}
.pb-fill{background:#fff;height:100%;border-radius:4px;transition:width .4s}
.pb-lbl{color:rgba(255,255,255,.7);font-size:.72rem;margin-top:4px;display:flex;justify-content:space-between}
/* PASSAGE LIST */
#passage-list{background:var(--bg)}
.plist{padding:1rem;display:flex;flex-direction:column;gap:.7rem;padding-bottom:80px}
.pitem{background:var(--card);border-radius:var(--r);padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;cursor:pointer;border:none;text-align:left;width:100%;box-shadow:var(--sh);transition:transform .12s}
.pitem:active{transform:scale(.98)}.pitem.done{opacity:.6}
.pnum{width:36px;height:36px;border-radius:50%;background:var(--curl);color:var(--cur);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pitem.done .pnum{background:var(--cur);color:#fff}
.pii{flex:1;min-width:0}.pit{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pim{font-size:.72rem;color:var(--lg);margin-top:2px}
.pir{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
/* QUIZ */
#quiz-screen{background:var(--bg)}
.qnav{background:var(--cur);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100}
.qctr{background:rgba(255,255,255,.2);color:#fff;font-size:.72rem;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.fbtn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700}
.qbody{padding:1rem;display:flex;flex-direction:column;gap:1rem;padding-bottom:80px}
/* VOCAB HINT */
.vh{background:#fffbf0;border-left:3px solid #f9a825;border-radius:0 10px 10px 0;padding:.7rem .9rem}
.vhl{font-size:.7rem;font-weight:700;color:#e65100;margin-bottom:4px}
.vhi{display:flex;flex-wrap:wrap;gap:.4rem}
.vc{background:#fff;border:1px solid #ffe082;border-radius:20px;padding:2px 10px;font-size:.75rem}
/* PASSAGE CARD */
.pc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.phdr{background:var(--cur);padding:.8rem 1rem}
.phdr-row{display:flex;justify-content:space-between;align-items:center}
.ptype{font-size:.7rem;color:rgba(255,255,255,.7);background:rgba(255,255,255,.15);padding:2px 8px;border-radius:20px}
.pdiff{font-size:.75rem;color:rgba(255,255,255,.7)}
.pgram{font-size:.72rem;color:rgba(255,255,255,.6);margin-top:4px}
.ptxt{padding:1rem;line-height:1.9;border-bottom:1px solid #f0f0f0}
.pnotes{padding:.6rem 1rem;background:#fafafa}
.pnote{font-size:.75rem;color:var(--gray);padding:2px 0}
/* QUESTION */
.qb{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.qt{padding:1rem;font-weight:700;line-height:1.6;border-bottom:1px solid #f0f0f0}
.chs{padding:.5rem;display:flex;flex-direction:column;gap:.4rem}
.ch{width:100%;padding:.75rem 1rem;border-radius:10px;border:2px solid #f0f0f0;background:#fff;font-family:'Noto Sans JP',sans-serif;text-align:left;cursor:pointer;display:flex;align-items:center;gap:.6rem;transition:all .15s;color:var(--ink)}
.ch:active{transform:scale(.98)}.ch:disabled{cursor:default}
.cn{width:26px;height:26px;border-radius:50%;background:#f0f0f0;color:var(--gray);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch.sel{border-color:var(--cur);background:var(--curl)}.ch.sel .cn{background:var(--cur);color:#fff}
.ch.ok{border-color:#2e7d32;background:#e8f5e9}.ch.ok .cn{background:#2e7d32;color:#fff}
.ch.ng{border-color:#c62828;background:#ffebee}.ch.ng .cn{background:#c62828;color:#fff}
.ch.rv{border-color:#2e7d32;background:#e8f5e9}.ch.rv .cn{background:#2e7d32;color:#fff}
/* CONFIRM */
.cfm{display:block;width:calc(100% - 1rem);margin:.4rem .5rem .5rem;padding:.8rem;background:var(--cur);color:#fff;border:none;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.cfm:active{opacity:.85}
/* BANNER */
.ban{display:none;padding:.8rem 1rem;font-size:.85rem;line-height:1.6}
.ban.show{display:block}
.ban.ok{background:#e8f5e9;color:#1b5e20;border-top:1px solid #c8e6c9}
.ban.ng{background:#ffebee;color:#b71c1c;border-top:1px solid #ffcdd2}
/* NEXT */
.nxtbtn{display:none;width:100%;background:var(--cur);color:#fff;border:none;border-radius:var(--r);padding:1rem;font-size:1rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.nxtbtn.show{display:block}.nxtbtn:active{opacity:.85}
/* RESULT */
#result-screen{background:var(--bg);align-items:center;justify-content:center;padding:2rem 1.5rem;padding-bottom:80px}
.rcard{background:var(--card);border-radius:20px;box-shadow:var(--sh);padding:2rem 1.5rem;width:100%;max-width:400px;text-align:center}
.sring{width:120px;height:120px;border-radius:50%;background:var(--curl);border:6px solid var(--cur);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.2rem}
.snum{font-size:2rem;font-weight:700;color:var(--cur);line-height:1}
.sden{font-size:.8rem;color:var(--gray)}
.rtitle{font-size:1.3rem;font-weight:700;margin-bottom:.4rem}
.rsub{font-size:.85rem;color:var(--gray);margin-bottom:1.5rem}
.rpills{display:flex;gap:.8rem;justify-content:center;margin-bottom:1.5rem}
.rpill{padding:.4rem 1rem;border-radius:20px;font-size:.8rem;font-weight:700}
.rpill.ok{background:#e8f5e9;color:#2e7d32}.rpill.ng{background:#ffebee;color:#c62828}
.racts{display:flex;flex-direction:column;gap:.7rem}
.btnp{background:var(--cur);color:#fff;border:none;border-radius:var(--r);padding:.9rem;font-size:.95rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;width:100%}
.btns{background:var(--curl);color:var(--curb);border:2px solid var(--cur);border-radius:var(--r);padding:.85rem;font-size:.95rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;width:100%}
/* REF */
#ref-screen{background:var(--bg)}
.rtabs{background:var(--cur);display:flex;padding:0 1rem .8rem;gap:.5rem;overflow-x:auto}
.rtab{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:20px;padding:.4rem 1rem;font-size:.8rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0}
.rtab.act{background:#fff;color:var(--cur)}
.rbody{padding:1rem;display:flex;flex-direction:column;gap:.8rem;padding-bottom:80px}
.rsec{display:none}.rsec.act{display:flex;flex-direction:column;gap:.7rem}
.rcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.rch{padding:.6rem 1rem;font-size:.8rem;font-weight:700;color:#fff}
.rcb{padding:.8rem 1rem}
.vrow{display:grid;grid-template-columns:1fr auto;gap:.3rem;padding:.5rem 0;border-bottom:1px solid #f0f0f0;font-size:.83rem}
.vrow:last-child{border-bottom:none}
.vw{font-weight:700;cursor:pointer;display:inline-block}
.vpos{font-size:.7rem;color:var(--lg)}
.vfr{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:10px;align-self:flex-start;margin-top:2px}
.fa{background:#fff3e0;color:#e65100}.fb{background:#e3f2fd;color:#1565c0}.fc{background:#f5f5f5;color:#999}
.vm{font-size:.8rem;color:var(--gray)}.ve{font-size:.75rem;color:var(--lg);font-style:italic;margin-top:2px}
.gr{padding:.7rem 0;border-bottom:1px solid #f0f0f0;font-size:.83rem}.gr:last-child{border-bottom:none}
.gp{font-weight:700;font-size:.88rem}.gm{color:var(--gray);font-size:.78rem;margin:2px 0}
.ge{font-size:.78rem}.gmk{font-size:.72rem;color:#c62828;margin-top:2px}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
.kcard{background:var(--curl);border-radius:10px;padding:.6rem .8rem;display:flex;align-items:center;gap:.6rem;cursor:pointer;transition:transform .12s;position:relative}
.kcard:active{transform:scale(.96)}
.kch{font-size:2rem;font-weight:700;color:var(--curb);line-height:1;min-width:36px}
.ki{flex:1;min-width:0}
.kr{font-size:.7rem;color:var(--curb);font-weight:700}.km{font-size:.72rem;color:var(--gray)}.ke{font-size:.68rem;color:var(--lg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ktgbtn{position:absolute;top:4px;right:6px;font-size:1rem;background:none;border:none;cursor:pointer;padding:2px;color:#ccc;transition:color .15s}
.ktgbtn.tg{color:#f9a825}
/* REVIEW */
#review-screen{background:var(--bg)}
.rtype-tabs{display:flex;padding:.6rem 1rem 0;background:#fff;gap:.5rem;border-bottom:2px solid #f0f0f0}
.rtt{flex:1;padding:.5rem 0 .7rem;border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;color:#999;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.rtt.act{color:var(--cur);border-bottom-color:var(--cur)}
.rfilt{padding:.8rem 1rem;display:flex;gap:.5rem;overflow-x:auto;background:#fff;border-bottom:1px solid #eee}
.fp{padding:.35rem .9rem;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.fp.act{border-color:var(--cur);background:var(--curl);color:var(--curb);font-weight:700}
.tlist{padding:.8rem;display:flex;flex-direction:column;gap:.5rem;padding-bottom:80px}
.trow{background:#fff;border-radius:12px;padding:.8rem 1rem;display:flex;align-items:center;gap:.8rem;box-shadow:0 1px 6px rgba(0,0,0,.06);cursor:pointer}
.trow:active{transform:scale(.98)}
.tch{font-size:1.8rem;font-weight:700;min-width:36px;text-align:center}
.ti{flex:1;min-width:0}.tr2{font-size:.75rem;color:#555;font-weight:700}.tm{font-size:.82rem;color:#333}
.tx{font-size:.72rem;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbdg{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.tuntag{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px;flex-shrink:0}
.rev-empty{text-align:center;padding:3rem 1.5rem;color:var(--lg)}
/* ANKI */
#anki-screen{background:var(--bg)}
.ankiv{background:var(--cur);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100}
.actr{color:rgba(255,255,255,.8);font-size:.8rem}
.ankibody{padding:1rem;display:flex;flex-direction:column;align-items:center;gap:1rem;padding-bottom:80px}
.aprow{width:100%;display:flex;gap:.5rem;align-items:center}
.apbg{flex:1;background:#e0e0e0;height:6px;border-radius:3px;overflow:hidden}
.apfill{height:100%;background:var(--cur);border-radius:3px;transition:width .4s}
.aplbl{font-size:.75rem;color:var(--lg);white-space:nowrap}
.fcwrap{width:100%;max-width:360px;perspective:1000px;cursor:pointer}
.fc{width:100%;min-height:260px;position:relative;transform-style:preserve-3d;transition:transform .5s;border-radius:20px}
.fc.flip{transform:rotateY(180deg)}
.fcface{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.fcfront{background:#fff}.fcback{background:var(--curl);transform:rotateY(180deg)}
.fchint{font-size:.72rem;color:var(--lg);margin-bottom:1rem}
.fcchar{font-size:5.5rem;font-weight:700;line-height:1;margin-bottom:.5rem}
.fcbdg{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
.fcr{font-size:1rem;font-weight:700;color:var(--curb);margin-bottom:.3rem}
.fcm{font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
.fce{font-size:.85rem;color:var(--gray);text-align:center}
.fctap{font-size:.72rem;color:var(--lg);margin-top:1rem}
.abtns{display:flex;gap:.8rem;width:100%;max-width:360px}.abtns.hidden{display:none}
.afgt{flex:1;padding:1rem;border-radius:14px;border:none;background:#ffebee;color:#c62828;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.akn{flex:1;padding:1rem;border-radius:14px;border:none;background:#e8f5e9;color:#1b5e20;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.afgt:active,.akn:active{transform:scale(.96)}
.aend{display:none;text-align:center;padding:2rem 1rem;width:100%}.aend.show{display:block}
.aeicon{font-size:3.5rem;margin-bottom:.5rem}.aetitle{font-size:1.3rem;font-weight:700;margin-bottom:.3rem}
.aesub{font-size:.85rem;color:var(--gray);margin-bottom:1.5rem}
.aestats{display:flex;gap:.8rem;justify-content:center;margin-bottom:1.5rem}
.aest{background:#fff;border-radius:12px;padding:.8rem 1.2rem;text-align:center;box-shadow:var(--sh)}
.aesn{font-size:1.6rem;font-weight:700}.aesl{font-size:.7rem;color:var(--lg)}
/* POPUPS */
.pop-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:center;justify-content:center;padding:1.5rem}
.pop-ov.show{display:flex}
.kpop,.kwpop{background:#fff;border-radius:20px;padding:1.8rem 1.5rem;width:100%;max-width:340px;animation:su .25s ease;position:relative}
.kwpop{padding:1.6rem 1.4rem 1.2rem;z-index:700}
.kwpop-ov{z-index:700}
.pclose{position:absolute;top:12px;right:14px;background:#f0f0f0;border:none;border-radius:50%;width:28px;height:28px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* KANJI POPUP */
.kpchar{font-size:5rem;font-weight:700;line-height:1;margin-bottom:.3rem;text-align:center}
.kpr{font-size:.9rem;color:#555;margin-bottom:.2rem;text-align:center}
.kpm{font-size:1rem;font-weight:700;margin-bottom:.6rem;text-align:center}
.kpe{font-size:.85rem;color:#777;background:#f5f5f5;border-radius:8px;padding:.5rem .8rem;margin-bottom:.8rem;line-height:1.7}
.kplv{font-size:.72rem;color:#999;margin-bottom:.8rem;text-align:center}
.kptag{width:100%;padding:.75rem;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.kptag.un{background:#fff3cd;color:#856404}.kptag.tg{background:#f9a825;color:#fff}
/* KOTOBA POPUP */
.kwphdr{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.3rem}
.kwpw{font-size:2rem;font-weight:700;color:#6a1b9a;line-height:1.1}
.kwpk{font-size:.85rem;color:#888}
.kwpbdg{margin-bottom:.5rem}
.kwppos{display:inline-block;font-size:.68rem;font-weight:700;background:#f3e5f5;color:#6a1b9a;padding:2px 8px;border-radius:20px}
.kwpfr{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:4px}
.kwpmn{font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
.kwpex{font-size:.85rem;color:#555;background:#f5f5f5;border-radius:8px;padding:.5rem .8rem;margin-bottom:.8rem;line-height:1.7}
.kwpkbd{background:#fafafa;border-radius:10px;padding:.6rem .8rem;margin-bottom:.8rem;display:none}
.kwpkbl{font-size:.7rem;color:#999;font-weight:700;letter-spacing:.05em;margin-bottom:6px}
.kwpchips{display:flex;flex-wrap:wrap;gap:.4rem}
.kchip{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;padding:4px 10px;cursor:pointer;transition:all .15s;font-size:.85rem}
.kchip:active{background:var(--curl);border-color:var(--cur)}.kchip.tg{border-color:#f9a825;background:#fffde7}
.kchipc{font-size:1.2rem;font-weight:700}.kchipinfo{font-size:.7rem;color:#666}
.kwptag{width:100%;padding:.7rem;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.kwptag.un{background:#f3e5f5;color:#6a1b9a}.kwptag.tg{background:#00897b;color:#fff}
/* INLINE KANJI/KOTOBA */
.k{display:inline;cursor:pointer;border-radius:2px;border-bottom:2px dotted rgba(21,101,192,.6)}
.k:active{background:#e3f2fd}.k.ki2{border-bottom:2.5px solid #f9a825}
.kw{display:inline;cursor:pointer;border-radius:2px;border-bottom:2.5px solid rgba(106,27,154,.55)}
.kw:active{background:#f3e5f5}.kw.kwt{border-bottom:2.5px solid #00897b}
.kw .k{border-bottom:1.5px dotted rgba(106,27,154,.35);vertical-align:baseline}
.kw .k.ki2{border-bottom:1.5px solid #f9a825}
/* PROG MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
.modal-ov.show{display:flex}
.msheet{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.2rem 2rem;width:100%;max-width:500px;animation:su .3s ease}
.mhandle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 1rem}
.mtitle{font-size:1.1rem;font-weight:700;margin-bottom:1rem}
.plrow{background:#f9f9f9;border-radius:12px;padding:.8rem 1rem;margin-bottom:.7rem}
.plhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.plname{font-weight:700;font-size:.9rem}.plpct{font-size:.8rem;color:var(--lg)}
.plbg{background:#e0e0e0;height:6px;border-radius:3px;overflow:hidden}
.plfill{height:100%;border-radius:3px;transition:width .5s}
.pldet{font-size:.75rem;color:var(--lg);margin-top:4px}
